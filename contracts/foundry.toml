[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
]
fs_permissions = [
    { access = "read-write", path = "./" },
    { access = "read-write", path = "../shared" },
]

[profile.default.invariant]
runs = 256
depth = 64
fail_on_revert = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

# Celo RPC + verification via env. (verify endpoints in docs.celo.org)
[rpc_endpoints]
celo_sepolia = "${CELO_RPC_URL}"
alfajores = "${CELO_RPC_URL}"
local = "http://127.0.0.1:8545"

[etherscan]
celo_sepolia = { key = "${CELOSCAN_API_KEY}", url = "https://api-sepolia.celoscan.io/api", chain = 11142220 }
alfajores = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api", chain = 44787 }
